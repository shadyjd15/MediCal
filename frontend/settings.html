<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings — MediCal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="/js/theme.js"></script>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-shell">
  <div id="sidebarMount"></div>
  <div class="main-area">
    <div class="topbar">
      <div>
        <h1>Settings</h1>
        <div class="topbar-sub">Manage your account</div>
      </div>
    </div>
    <div class="content" style="max-width:560px;">
      <div class="card" style="margin-bottom:18px;">
        <div class="card-header"><h3>Profile</h3></div>
        <div id="profileBox" style="display:flex;align-items:center;gap:14px;">
          <div class="user-avatar" style="width:50px;height:50px;font-size:17px;background:var(--teal-dark);" id="profAvatar"></div>
          <div>
            <div style="font-weight:700;font-size:15.5px;color:var(--navy);" id="profName"></div>
            <div style="font-size:12.5px;color:var(--text-soft);" id="profMeta"></div>
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:18px;">
        <div class="card-header"><h3>Appearance</h3></div>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div style="font-weight:600;font-size:13.5px;">Dark mode</div>
            <div class="topbar-sub">Switch between light and dark themes</div>
          </div>
          <button class="btn btn-secondary" id="appearanceToggleBtn"></button>
        </div>
      </div>

      <div class="card" style="margin-bottom:18px;">
        <div class="card-header"><h3>Change password</h3></div>
        <form id="pwForm">
          <div class="field field-spaced">
            <label>New password</label>
            <input type="password" id="newPassword" required minlength="4" />
          </div>
          <div class="field field-spaced">
            <label>Confirm new password</label>
            <input type="password" id="confirmPassword" required minlength="4" />
          </div>
          <button type="submit" class="btn btn-primary">Update password</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
Auth.requireAuth();
mountSidebar("settings");

const user = Auth.getUser();
document.getElementById("profAvatar").textContent = initials(user.full_name || user.username);
document.getElementById("profName").textContent = user.full_name || user.username;
document.getElementById("profMeta").textContent = `${user.username} · ${user.role}`;

document.getElementById("pwForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const a = document.getElementById("newPassword").value;
  const b = document.getElementById("confirmPassword").value;
  if (a !== b) { showToast("Passwords do not match", "error"); return; }
  try {
    await Api.changeMyPassword(a);
    showToast("Password updated", "success");
    document.getElementById("pwForm").reset();
  } catch (err) { showToast(err.message, "error"); }
});

function renderAppearanceBtn() {
  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  document.getElementById("appearanceToggleBtn").textContent = isDark ? "Switch to light mode" : "Switch to dark mode";
}
renderAppearanceBtn();
document.getElementById("appearanceToggleBtn").addEventListener("click", async () => {
  toggleTheme();
  renderAppearanceBtn();
  const theme = document.documentElement.getAttribute("data-theme");
  try { await Api.updateMyTheme(theme); } catch (err) { /* non-fatal */ }
});
</script>
</body>
</html>
